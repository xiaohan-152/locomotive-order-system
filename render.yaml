services:
  - type: web
    name: locomotive-order-system
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: "10000"
      - key: QQ_EMAIL
        sync: false
      - key: QQ_AUTH_CODE
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: SENDER_NAME
        sync: false
